# Infrastructure services shared by dev (override) and production (prod overlay).
# Application services: docker-compose.override.yml (dev) or docker-compose.prod.yml (registry images).
name: ${COMPOSE_PROJECT_NAME:-docsops}

services:
  postgres:
    container_name: ${COMPOSE_PROJECT_NAME:-docsops}-postgres
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: docsops
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d docsops']
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    container_name: ${COMPOSE_PROJECT_NAME:-docsops}-minio
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-docsops}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-docsopsdev}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
